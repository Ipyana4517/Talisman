<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talisman — Entry Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen font-sans antialiased bg-gradient-to-b from-slate-900 via-slate-950 to-black pb-32 text-slate-100">

    <header class="border-b-2 border-slate-800 bg-slate-900/95 backdrop-blur sticky top-0 z-40 px-4 py-4 shadow-2xl">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <a href="{% url 'dashboard' %}" class="text-emerald-400 hover:text-emerald-300 transition text-base font-black">← Back to Hub</a>
            <h1 class="text-lg font-black tracking-wider text-slate-200 uppercase">Record Entry</h1>
            <div class="w-10 h-10 rounded-lg bg-emerald-500/10 border-2 border-emerald-500/30 flex items-center justify-center text-emerald-400 text-xl">📝</div>
        </div>
    </header>

    <main class="max-w-xl mx-auto px-4 py-6">

        {% if messages %}
            {% for message in messages %}
                <div id="successMessage" class="mb-6 p-4 bg-emerald-500/20 border-2 border-emerald-500 rounded-xl text-center text-base font-black text-emerald-300 shadow-[0_0_20px_rgba(16,185,129,0.2)] tracking-wide animate-bounce">
                    {{ message }}
                </div>
            {% endfor %}
            <script>
                // Automatically disappear the notification smoothly after 3 seconds
                setTimeout(() => {
                    const alert = document.getElementById('successMessage');
                    if(alert) alert.style.display = 'none';
                }, 3000);
            </script>
        {% endif %}

        <div class="bg-slate-900/60 border-2 border-slate-800 backdrop-blur rounded-2xl p-6 shadow-2xl">
            <form method="POST" action="" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-black uppercase tracking-wider text-slate-300 mb-2">Transaction Details</label>
                    <input type="text" name="title" placeholder="e.g., Purchase of Cloth / Safari Fuel" required autofocus
                           class="w-full bg-slate-950 border-2 border-slate-800 rounded-xl px-4 py-3.5 text-base font-bold text-slate-100 focus:outline-none focus:border-emerald-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-black uppercase tracking-wider text-slate-300 mb-2">Target Account Allocation</label>
                    <select name="category" required 
                            class="w-full bg-slate-950 border-2 border-slate-800 rounded-xl px-4 py-3.5 text-base font-bold text-slate-100 focus:outline-none focus:border-emerald-500 transition">
                        <option value="" disabled selected>Select specific account (e.g. Travel, Dividend, Salary)...</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">[{{ cat.get_type_display }}] — {{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-black uppercase tracking-wider text-slate-300 mb-2">Magnitude Amount (TZS)</label>
                    <input type="number" step="0.01" name="amount" placeholder="0.00" required
                           class="w-full bg-slate-950 border-2 border-slate-800 rounded-xl px-4 py-3.5 text-base font-black text-slate-100 focus:outline-none focus:border-emerald-500 transition font-mono">
                </div>

                <div>
                    <label class="block text-sm font-black uppercase tracking-wider text-slate-300 mb-2">Maturity Status</label>
                    <select name="is_reconciled" 
                            class="w-full bg-slate-950 border-2 border-slate-800 rounded-xl px-4 py-3.5 text-base font-bold text-slate-100 focus:outline-none focus:border-emerald-500 transition">
                        <option value="true">Reconciled / Settled Instantly (Cash Trade)</option>
                        <option value="false">Unresolved / Pending (Triggers Due Watchlist)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-black uppercase tracking-wider text-slate-300 mb-2">Other Notes / Remarks</label>
                    <textarea name="remarks" rows="2" placeholder="Write any specific notes, clothing types, voucher numbers here..."
                              class="w-full bg-slate-950 border-2 border-slate-800 rounded-xl px-4 py-3 text-base font-medium text-slate-200 focus:outline-none focus:border-emerald-500 transition"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4 pt-2">
                    <button type="submit" name="action" value="save_new"
                            class="bg-slate-950 hover:bg-slate-900 text-emerald-400 border-2 border-emerald-500/50 font-black text-sm py-4 rounded-xl transition uppercase tracking-wider shadow-md">
                        💾 Save & New
                    </button>
                    <button type="submit" name="action" value="save_close"
                            class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black text-sm py-4 rounded-xl transition uppercase tracking-wider shadow-xl border border-emerald-500/20">
                        🚀 Save & Close
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-xl border-t-2 border-slate-800 shadow-2xl py-3 px-4">
        <div class="max-w-md mx-auto flex justify-center items-center space-x-6">
            <a href="{% url 'dashboard' %}" class="flex flex-col items-center p-2 text-slate-400 hover:text-slate-200 font-bold">
                <span class="text-3xl">📊</span><span class="text-xs mt-1">Hub</span>
            </a>
            <a href="{% url 'accounts' %}" class="flex flex-col items-center p-2 text-slate-400 hover:text-slate-200 font-bold">
                <span class="text-3xl">🗂️</span><span class="text-xs mt-1">Accounts</span>
            </a>
            <a href="{% url 'income' %}" class="flex flex-col items-center p-2 text-slate-400 hover:text-slate-200 font-bold">
                <span class="text-3xl">📥</span><span class="text-xs mt-1">Inflow</span>
            </a>
            <a href="{% url 'expenses' %}" class="flex flex-col items-center p-2 text-slate-400 hover:text-slate-200 font-bold">
                <span class="text-3xl">📤</span><span class="text-xs mt-1">Outflow</span>
            </a>
            <a href="{% url 'reports' %}" class="flex flex-col items-center p-2 text-slate-400 hover:text-slate-200 font-bold">
                <span class="text-3xl">📄</span><span class="text-xs mt-1">Reports</span>
            </a>
        </div>
    </footer>

</body>
</html>
